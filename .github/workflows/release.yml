name: Signed Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version name from app/build.gradle.kts, without the v prefix
        required: true
        type: string
  push:
    branches:
      - "release/v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7

      - name: Resolve and validate release version
        id: release
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            [[ "${GITHUB_REF}" == "refs/heads/main" ]]
            version="${INPUT_VERSION}"
            publish=false
          else
            [[ "${GITHUB_REF}" == refs/heads/release/v* ]]
            version="${GITHUB_REF_NAME#release/v}"
            main_sha="$(git ls-remote origin refs/heads/main | awk 'NR == 1 { print $1 }')"
            [[ -n "${main_sha}" && "${GITHUB_SHA}" == "${main_sha}" ]]
            publish=true
          fi
          [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          grep -Fq "versionName = \"${version}\"" app/build.gradle.kts
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"
          echo "RELEASE_VERSION=${version}" >> "${GITHUB_ENV}"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: false

      - uses: android-actions/setup-android@v4

      - name: Install Android 16 SDK and NDK
        run: >-
          sdkmanager
          "platforms;android-36"
          "build-tools;36.0.0"
          "cmake;3.22.1"
          "ndk;29.0.14206865"

      - uses: gradle/actions/setup-gradle@v6

      - name: Restore release signing key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          [[ -n "${KEYSTORE_BASE64}" ]]
          [[ -n "${STORE_PASSWORD}" ]]
          [[ -n "${KEY_ALIAS}" ]]
          [[ -n "${KEY_PASSWORD}" ]]
          keystore="${RUNNER_TEMP}/androidcyaml-release.p12"
          printf '%s' "${KEYSTORE_BASE64}" | base64 --decode > "${keystore}"
          chmod 600 "${keystore}"
          echo "ANDROID_SIGNING_STORE_FILE=${keystore}" >> "${GITHUB_ENV}"
          echo "ANDROID_SIGNING_STORE_PASSWORD=${STORE_PASSWORD}" >> "${GITHUB_ENV}"
          echo "ANDROID_SIGNING_KEY_ALIAS=${KEY_ALIAS}" >> "${GITHUB_ENV}"
          echo "ANDROID_SIGNING_KEY_PASSWORD=${KEY_PASSWORD}" >> "${GITHUB_ENV}"

      - name: Build signed release and lint
        shell: bash
        run: |
          set -o pipefail
          status=0
          ./gradlew :app:assembleRelease :app:lintRelease --stacktrace 2>&1 | tee build-release.log || status=$?
          if (( status != 0 )); then
            while IFS= read -r report; do
              {
                echo
                echo "===== ${report} ====="
                cat "${report}"
              } | tee -a build-release.log
            done < <(find app/build -type f -name 'lint-results-*.txt' -print | sort)
          fi
          exit "${status}"

      - name: Verify and name release APK
        shell: bash
        run: |
          set -euo pipefail
          source_apk="app/build/outputs/apk/release/app-release.apk"
          release_apk="AndroidCyaml-v${RELEASE_VERSION}-arm64-v8a.apk"
          "${ANDROID_SDK_ROOT}/build-tools/36.0.0/apksigner" \
            verify --verbose --print-certs "${source_apk}"
          cp "${source_apk}" "${release_apk}"
          sha256sum "${release_apk}" | tee SHA256SUMS

      - name: Upload signed release artifact
        uses: actions/upload-artifact@v7
        with:
          name: AndroidCyaml-v${{ steps.release.outputs.version }}-signed
          path: |
            AndroidCyaml-v${{ steps.release.outputs.version }}-arm64-v8a.apk
            SHA256SUMS
            build-release.log
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: steps.release.outputs.publish == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "${RELEASE_TAG}" \
            "AndroidCyaml-v${RELEASE_VERSION}-arm64-v8a.apk" \
            "SHA256SUMS" \
            --target "${GITHUB_SHA}" \
            --title "AndroidCyaml v${RELEASE_VERSION}" \
            --generate-notes
