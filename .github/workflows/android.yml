name: Android

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: false

      - uses: android-actions/setup-android@v4

      - name: Install Android 16 SDK and NDK
        run: >-
          sdkmanager
          "platforms;android-36"
          "build-tools;36.0.0"
          "cmake;3.22.1"
          "ndk;29.0.14206865"

      - uses: gradle/actions/setup-gradle@v6

      - name: Build and lint
        shell: bash
        run: |
          set -o pipefail
          status=0
          ./gradlew :app:assembleDebug :app:lintDebug --stacktrace 2>&1 | tee build.log || status=$?
          if (( status != 0 )); then
            while IFS= read -r report; do
              {
                echo
                echo "===== ${report} ====="
                cat "${report}"
              } | tee -a build.log
            done < <(find app/build -type f -name 'lint-results-*.txt' -print | sort)
          fi
          exit "${status}"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: AndroidCyaml-build-log
          path: build.log
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: AndroidCyaml-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
