name: Android

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: false

      - uses: android-actions/setup-android@v4

      - name: Install Android 17 SDK and NDK
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --channel=1 "cmdline-tools;latest"
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
            --channel=1 \
            "platforms;android-37" \
            "build-tools;37.0.0" \
            "cmake;3.22.1" \
            "ndk;29.0.14206865"

      - uses: gradle/actions/setup-gradle@v6

      - name: Build and verify optimized artifacts
        shell: bash
        run: |
          set -o pipefail
          status=0
          ./gradlew \
            :app:testDebugUnitTest \
            :app:assembleOptimized \
            :app:bundleOptimized \
            :app:lintOptimized \
            --stacktrace 2>&1 | tee build.log || status=$?
          if (( status == 0 )); then
            bash scripts/verify_native_runtime.sh \
              app/build/outputs/apk/optimized/app-optimized.apk \
              2>&1 | tee -a build.log || status=$?
          fi
          if (( status == 0 )); then
            bash scripts/verify_art_optimization.sh \
              app/build/outputs/apk/optimized/app-optimized.apk \
              app/build/outputs/bundle/optimized/app-optimized.aab \
              2>&1 | tee -a build.log || status=$?
          fi
          if (( status != 0 )); then
            while IFS= read -r report; do
              {
                echo
                echo "===== ${report} ====="
                cat "${report}"
              } | tee -a build.log
            done < <(find app/build -type f -name 'lint-results-*.txt' -print | sort)
          fi
          exit "${status}"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: AndroidCyaml-build-log
          path: build.log
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: AndroidCyaml-optimized-test
          path: |
            app/build/outputs/apk/optimized/app-optimized.apk
            app/build/outputs/bundle/optimized/app-optimized.aab
          if-no-files-found: error
